<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Ketuntasan Siswa - X TKJ 4</title>
    <!-- Menggunakan Bootstrap 5 untuk tampilan modern -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-login { max-width: 400px; margin: 100px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-result { max-width: 700px; margin: 40px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .badge-tuntas { background-color: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
        .badge-belum { background-color: #dc3545; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
        .badge-kosong { background-color: #6c757d; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container px-3">
   <!-- 1. HALAMAN LOGIN -->
    <div id="login-section" class="card card-login p-4">
        <div class="text-center mb-4">
            <!-- LOGO SEKOLAH -->
            <img src="https://pbl.polibatam.ac.id/apps/uploads/pbl/13/13_gambar2_20221230.png" alt="Logo Sekolah" class="img-fluid mb-3" style="max-height: 100px; width: auto; object-fit: contain;">
            
            <h4 class="fw-bold text-primary">Portal Ketuntasan Belajar</h4>
            <small class="text-muted">Kelas X TKJ 4</small>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label for="nisn" class="form-label fw-semibold">NISN</label>
                <input type="text" class="form-control form-control-lg" id="nisn" placeholder="Contoh: 0101425639" required autocomplete="off">
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-100 fw-bold">Login</button>
        </form>
        <div id="login-error" class="alert alert-danger mt-3 text-center d-none" role="alert"></div>
    </div>

   <!-- 2. HALAMAN DASHBOARD / HASIL (Hidden secara default) -->
    <div id="result-section" class="card card-result p-4 d-none">
        <!-- Bagian Atas: Sekarang Fokus Hanya Untuk Nama & NISN -->
        <div class="border-bottom pb-3 mb-4">
            <h3 class="fw-bold text-success mb-1" id="student-name">Nama Siswa</h3>
            <span class="text-muted">NISN: <span id="student-nisn">00000000</span></span>
        </div>

        <h5 class="fw-bold mb-3 text-secondary">Status Ketuntasan Mata Pelajaran:</h5>
        <div class="table-responsive mb-4">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mata Pelajaran</th>
                        <th class="text-center" style="width: 150px;">Status</th>
                    </tr>
                </thead>
                <tbody id="mapel-table-body">
                    <!-- Data dimasukkan via Javascript -->
                </tbody>
            </table>
        </div>

        <!-- Tombol Keluar Baru: Dipindah ke Bawah, Full Width agar Nyaman Di-klik di HP -->
        <div class="d-grid mt-2">
            <button onclick="logout()" class="btn btn-outline-danger btn-lg fw-bold">Keluar & Kembali</button>
        </div>
    </div>

<script>
    // GANTI URL INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxn2YDcPiYI3yMW_rZ4rq7CZ-I4OtZtEUy25tFcJmcIyIF311bdiPRJh4BFPliis6AL/exec";
// 1. JALANKAN OTOMATIS SAAT HALAMAN DI-REFRESH
    // Memeriksa apakah ada sesi login siswa yang tersimpan di memori browser
    document.addEventListener("DOMContentLoaded", function() {
        const savedData = sessionStorage.getItem("studentSession");
        if (savedData) {
            const data = JSON.parse(savedData);
            tampilkanHalamanHasil(data);
        }
    });

    // 2. PROSES EVENT SAAT TOMBOL LOGIN DI-KLIK
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nisnValue = document.getElementById('nisn').value.trim();
        const btnLogin = document.getElementById('btn-login');
        const errorDiv = document.getElementById('login-error');
        
        // Proteksi UI: Kunci tombol dan tampilkan indikator loading
        btnLogin.disabled = true;
        btnLogin.innerText = "Memeriksa...";
        errorDiv.classList.add('d-none');

        // Menembak API Google Apps Script
        fetch(`${BASE_API_URL}?nisn=${nisnValue}`)
            .then(response => response.json())
            .then(data => {
                // Kembalikan status tombol login
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk & Cek Nilai";

                if (data.status === "success") {
                    // Simpan data login ke memori browser (Session Storage)
                    sessionStorage.setItem("studentSession", JSON.stringify(data));
                    
                    // Tampilkan data ke halaman hasil
                    tampilkanHalamanHasil(data);
                } else {
                    // Tampilkan pesan jika NISN salah atau tidak ditemukan
                    errorDiv.innerText = data.message || "Terjadi kesalahan.";
                    errorDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                // Penanganan jika koneksi internet putus atau URL API salah
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk & Cek Nilai";
                errorDiv.innerText = "Gagal terhubung ke server. Pastikan URL API Anda sudah benar.";
                errorDiv.classList.remove('d-none');
                console.error("Error Fetching Data:", error);
            });
    });

    // 3. FUNGSI UNTUK MENAMPILKAN DATA NILAI KE HALAMAN WEB
    function tampilkanHalamanHasil(data) {
        // Tukar tampilan halaman (Sembunyikan login, Munculkan hasil)
        document.getElementById('login-section').classList.add('d-none');
        document.getElementById('result-section').classList.remove('d-none');
        
        // Isi informasi teks siswa
        document.getElementById('student-name').innerText = data.nama;
        document.getElementById('student-nisn').innerText = data.nisn;
        
        // Render tabel daftar mata pelajaran secara dinamis
        const tbody = document.getElementById('mapel-table-body');
        tbody.innerHTML = ""; // Bersihkan sisa data sebelumnya jika ada
        
        data.mapel.forEach(item => {
            let badgeClass = "badge-kosong";
            let statusText = item.status;

            // Penyesuaian warna badge berdasarkan status ketuntasan
            if (item.status.toLowerCase() === "tuntas") {
                badgeClass = "badge-tuntas";
            } else if (item.status.toLowerCase() === "tidak tuntas") {
                badgeClass = "badge-belum";
            }

            // Susun baris tabel HTML
            const row = `<tr>
                <td class="fw-medium">${item.nama_mapel}</td>
                <td class="text-center"><span class="${badgeClass}">${statusText}</span></td>
            </tr>`;
            
            // Masukkan baris ke dalam tabel
            tbody.innerHTML += row;
        });
    }

    // 4. FUNGSI TOMBOL KELUAR (LOGOUT)
    function logout() {
        // Hancurkan memori login di browser agar aman dari intipan siswa lain
        sessionStorage.removeItem("studentSession");

        // Reset input form login agar kosong kembali
        document.getElementById('nisn').value = "";
        
        // Tukar kembali halaman (Sembunyikan hasil, Munculkan login)
        document.getElementById('result-section').classList.add('d-none');
        document.getElementById('login-section').classList.remove('d-none');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
