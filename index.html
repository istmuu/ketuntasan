<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Ketuntasan Siswa - X TKJ 4</title>
    <!-- Menggunakan Bootstrap 5 untuk tampilan modern -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-login { max-width: 400px; margin: 100px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-result { max-width: 700px; margin: 40px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .badge-tuntas { background-color: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
        .badge-belum { background-color: #dc3545; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
        .badge-kosong { background-color: #6c757d; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container px-3">
    <!-- 1. HALAMAN LOGIN -->
    <div id="login-section" class="card card-login p-4">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">Portal Ketuntasan Belajar</h4>
            <small class="text-muted">Kelas X TKJ 4</small>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label for="nisn" class="form-label fw-semibold">Masukkan NISN Anda</label>
                <input type="text" class="form-control form-control-lg" id="nisn" placeholder="Contoh: 007123456" required autocomplete="off">
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary btn-lg w-100 fw-bold">Masuk & Cek Nilai</button>
        </form>
        <div id="login-error" class="alert alert-danger mt-3 text-center d-none" role="alert"></div>
    </div>

    <!-- 2. HALAMAN DASHBOARD / HASIL (Hidden secara default) -->
    <div id="result-section" class="card card-result p-4 d-none">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
                <h3 class="fw-bold text-success mb-0" id="student-name">Nama Siswa</h3>
                <span class="text-muted">NISN: <span id="student-nisn">00000000</span></span>
            </div>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm fw-bold">Keluar</button>
        </div>

        <h5 class="fw-bold mb-3 text-secondary">Status Ketuntasan Mata Pelajaran:</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mata Pelajaran</th>
                        <th class="text-center" style="width: 150px;">Status</th>
                    </tr>
                </thead>
                <tbody id="mapel-table-body">
                    <!-- Data dimasukkan via Javascript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // GANTI URL INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const BASE_API_URL = "https://script.google.com/macros/s/AKfycbzUgNhXqM5PTsopWmpHx7ikXlqEWNS7Js_mDO6EPXLPqdmHmDNfmik6JLf7x6yZya-k/exec ";

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nisnValue = document.getElementById('nisn').value.trim();
        const btnLogin = document.getElementById('btn-login');
        const errorDiv = document.getElementById('login-error');
        
        // Proteksi UI saat loading
        btnLogin.disabled = true;
        btnLogin.innerText = "Memeriksa...";
        errorDiv.classList.add('d-none');

        // Menembak API Google Apps Script
        fetch(`${BASE_API_URL}?nisn=${nisnValue}`)
            .then(response => response.json())
            .then(data => {
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk & Cek Nilai";

                if (data.status === "success") {
                    // Pindah halaman jika sukses
                    document.getElementById('login-section').classList.add('d-none');
                    document.getElementById('result-section').classList.remove('d-none');
                    
                    // Isi informasi siswa
                    document.getElementById('student-name').innerText = data.nama;
                    document.getElementById('student-nisn').innerText = data.nisn;
                    
                    // Render daftar mapel ke dalam tabel
                    const tbody = document.getElementById('mapel-table-body');
                    tbody.innerHTML = ""; // reset tabel
                    
                    data.mapel.forEach(item => {
                        let badgeClass = "badge-kosong";
                        let statusText = item.status;

                        if (item.status.toLowerCase() === "tuntas") {
                            badgeClass = "badge-tuntas";
                        } else if (item.status.toLowerCase() === "tidak tuntas") {
                            badgeClass = "badge-belum";
                        }

                        const row = `<tr>
                            <td class="fw-medium">${item.nama_mapel}</td>
                            <td class="text-center"><span class="${badgeClass}">${statusText}</span></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });

                } else {
                    // Jika NISN salah atau error backend
                    errorDiv.innerText = data.message || "Terjadi kesalahan.";
                    errorDiv.classList.remove('d-none');
                }
            })
            .catch(error => {
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk & Cek Nilai";
                errorDiv.innerText = "Gagal terhubung ke server. Pastikan URL API benar.";
                errorDiv.classList.remove('d-none');
                console.error(error);
            });
    });

    function logout() {
        // Reset form login
        document.getElementById('nisn').value = "";
        // Tukar halaman kembali ke login
        document.getElementById('result-section').classList.add('d-none');
        document.getElementById('login-section').classList.remove('d-none');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
